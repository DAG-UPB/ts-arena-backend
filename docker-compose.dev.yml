services:
  api-portal:
    ports:
      - "8458:8000"

  dashboard-api:
    container_name: ts-arena-dashboard-api
    ports:
      - "8485:8000"

  cloudbeaver:
    container_name: cloudbeaver
    ports:
      - "8979:8978"

  timescaledb:
    volumes:
      - ./init_db.sql:/docker-entrypoint-initdb.d/init_db.sql
      - ./database:/var/lib/postgresql/data
